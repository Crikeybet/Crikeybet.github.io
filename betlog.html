<!DOCTYPE html>
<html>
<head>
  <title>Bet Log</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      padding: 20px;
      text-align: center;
    }

    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 1000px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    th, td {
      border-bottom: 1px solid #ddd;
      padding: 10px;
      font-size: 14px;
      text-align: center;
      vertical-align: top;
    }

    th {
      background: #2c7be5;
      color: white;
    }

    button {
      padding: 6px 10px;
      margin: 2px;
      background: #2c7be5;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .green {
      color: green;
      font-weight: bold;
    }

    .red {
      color: red;
      font-weight: bold;
    }

    .small {
      font-size: 12px;
      opacity: 0.8;
    }

    .outcome-list {
      text-align: left;
      font-size: 12px;
      line-height: 1.5;
    }

    .multilay-badge {
      display: inline-block;
      background: #6c757d;
      color: white;
      padding: 3px 8px;
      border-radius: 12px;
      font-size: 12px;
      margin-top: 4px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Your Bet Log</h1>
  <h2 id="totalProfit">Total Profit: £0.00</h2>

  <table id="betTable">
    <thead>
      <tr>
        <th>Mode</th>
        <th>Stake</th>
        <th>Back</th>
        <th>Lay / Details</th>
        <th>Result</th>
        <th>Profit</th>
        <th>Actions</th>
        <th>Linked To</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <br>
  <a href="index.html"><button type="button">Back to Calculator</button></a>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import {
  getFirestore,
  collection,
  query,
  where,
  onSnapshot,
  orderBy,
  doc,
  getDoc,
  updateDoc,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCY9HlGR-Tt-3pQvQyfaHw6VgtMwIxd6g8",
  authDomain: "crikeybet-3c0e3.firebaseapp.com",
  projectId: "crikeybet-3c0e3",
  storageBucket: "crikeybet-3c0e3.firebasestorage.app",
  messagingSenderId: "192582085796",
  appId: "1:192582085796:web:1ddc96584f00769f30ca31"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const tableBody = document.querySelector("#betTable tbody");
const totalProfitEl = document.getElementById("totalProfit");

onAuthStateChanged(auth, (user) => {
  if (!user) {
    alert("You must be logged in.");
    window.location.href = "index.html";
    return;
  }

  const q = query(
    collection(db, "bets"),
    where("userId", "==", user.uid),
    orderBy("createdAt", "desc")
  );

  onSnapshot(q, (snapshot) => {
    tableBody.innerHTML = "";
    let totalProfit = 0;

    snapshot.forEach((docSnap) => {
      const bet = docSnap.data();
      const id = docSnap.id;

      const profit = Number(bet.profit || 0);
      totalProfit += profit;

      const profitClass = profit > 0 ? "green" : (profit < 0 ? "red" : "");
      const result = bet.result || "pending";
      const linkedTo = bet.linkedTo || "";

      // MULTI-LAY DISPLAY
      if (bet.mode === "multilay") {
        let outcomesHtml = `<div class="outcome-list">`;

        if (Array.isArray(bet.outcomes)) {
          bet.outcomes.forEach((outcome, index) => {
            outcomesHtml += `
              <strong>${index + 1}. ${outcome.name}</strong><br>
              Lay Odds: ${Number(outcome.layOdds).toFixed(2)}<br>
              Commission: ${((Number(outcome.commissionRate || 0)) * 100).toFixed(2)}%<br>
              Lay Stake: £${Number(outcome.layStake || 0).toFixed(2)}<br>
              Liability: £${Number(outcome.liability || 0).toFixed(2)}<br>
              Exposure: £${Number(outcome.exposure || 0).toFixed(2)}<br><br>
            `;
          });
        }

        outcomesHtml += `</div>`;

        tableBody.innerHTML += `
          <tr>
            <td>
              Multi-Lay
              <div class="multilay-badge">Settled</div>
            </td>
            <td>£${Number(bet.stake || 0).toFixed(2)}</td>
            <td>${Number(bet.backOdds || 0).toFixed(2)}</td>
            <td>
              <div class="outcome-list">
                <strong>Total Liability:</strong> £${Number(bet.totalLiability || 0).toFixed(2)}<br>
                <strong>Total Lay Stakes:</strong> £${Number(bet.totalLayStake || 0).toFixed(2)}<br><br>
                ${outcomesHtml}
              </div>
            </td>
            <td>settled</td>
            <td><span class="${profitClass}">£${profit.toFixed(2)}</span></td>
            <td>
              <button onclick="deleteBet('${id}')">Delete</button>
            </td>
            <td class="small">-</td>
          </tr>
        `;
        return;
      }

      // NORMAL BETS
      const actions = (result === "pending")
        ? `
          <button onclick="settleBet('${id}', 'back')">Back Won</button>
          <button onclick="settleBet('${id}', 'lay')">Lay Won</button>
          <button onclick="deleteBet('${id}')">Delete</button>
        `
        : `
          <button onclick="undoBet('${id}')">Undo</button>
          <button onclick="deleteBet('${id}')">Delete</button>
        `;

      let layDetails = bet.layOdds ?? "";

      if (bet.mode === "riskfree" && bet.freeBetChildId) {
        layDetails = `
          ${bet.layOdds ?? ""}<br>
          <span class="small">Free bet attached: ${bet.freeBetChildId}</span>
        `;
      }

      tableBody.innerHTML += `
        <tr>
          <td>${bet.mode || ""}</td>
          <td>£${Number(bet.stake || 0).toFixed(2)}</td>
          <td>${bet.backOdds ?? ""}</td>
          <td>${layDetails}</td>
          <td>${result}</td>
          <td><span class="${profitClass}">£${profit.toFixed(2)}</span></td>
          <td>${actions}</td>
          <td class="small">${linkedTo || "-"}</td>
        </tr>
      `;
    });

    const totalClass = totalProfit > 0 ? "green" : (totalProfit < 0 ? "red" : "");
    totalProfitEl.innerHTML = `Total Profit: <span class="${totalClass}">£${totalProfit.toFixed(2)}</span>`;
  });
});

// BACK WON / LAY WON
window.settleBet = async function(betId, outcome) {
  try {
    const betRef = doc(db, "bets", betId);
    const betSnap = await getDoc(betRef);

    if (!betSnap.exists()) {
      alert("Bet not found.");
      return;
    }

    const bet = betSnap.data();
    const backProfit = Number(bet.backProfit || 0);
    const layProfit = Number(bet.layProfit || 0);

    const finalProfit = (outcome === "back") ? backProfit : layProfit;

    const eligibleUpdate = (bet.mode === "riskfree" && outcome === "lay")
      ? { eligibleForFreeBet: true }
      : { eligibleForFreeBet: false };

    await updateDoc(betRef, {
      result: outcome,
      profit: finalProfit,
      ...eligibleUpdate
    });

    if (bet.mode === "riskfree" && outcome === "lay") {
      alert("Risk Free bet lost. Go to calculator → SNR mode → select it in the dropdown to attach free bet.");
    }
  } catch (err) {
    console.error("settleBet failed:", err);
    alert("Failed to settle bet. Check console.");
  }
};

// UNDO
window.undoBet = async function(betId) {
  try {
    const betRef = doc(db, "bets", betId);
    const betSnap = await getDoc(betRef);

    if (!betSnap.exists()) {
      alert("Bet not found.");
      return;
    }

    const bet = betSnap.data();
    const backProfit = Number(bet.backProfit || 0);
    const layProfit = Number(bet.layProfit || 0);

    const defaultPendingProfit = (bet.mode === "riskfree")
      ? backProfit
      : Math.min(backProfit, layProfit);

    await updateDoc(betRef, {
      result: "pending",
      profit: defaultPendingProfit,
      eligibleForFreeBet: false
    });
  } catch (err) {
    console.error("undoBet failed:", err);
    alert("Failed to undo bet. Check console.");
  }
};

// DELETE
window.deleteBet = async function(betId) {
  try {
    const ok = confirm("Delete this bet? This cannot be undone.");
    if (!ok) return;

    await deleteDoc(doc(db, "bets", betId));
  } catch (err) {
    console.error("deleteBet failed:", err);
    alert(err?.message || "Failed to delete bet. Check console.");
  }
};
</script>

</body>
</html>
